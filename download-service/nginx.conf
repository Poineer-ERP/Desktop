server {
    listen 80;
    server_name _;

    set $github_base "https://github.com/Poineer-ERP/desktop/releases/latest/download";

    # /windows  →  latest Windows installer (.exe)
    location = /windows {
        return 302 $github_base/Qeyam-Setup.exe;
    }

    # /windows/zip  →  latest Windows portable (.zip)
    location = /windows/zip {
        return 302 $github_base/Qeyam-win.zip;
    }

    # /mac  →  latest macOS disk image (.dmg)
    location = /mac {
        return 302 $github_base/Qeyam.dmg;
    }

    # /mac/zip  →  latest macOS portable (.zip)
    location = /mac/zip {
        return 302 $github_base/Qeyam-mac.zip;
    }

    # Root: show a simple JSON status so you can health-check the service
    location = / {
        default_type application/json;
        return 200 '{"status":"ok","windows":"/windows","mac":"/mac"}';
    }
}
